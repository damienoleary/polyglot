name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y build-essential automake autoconf

      - name: Build
        run: |
          ./configure
          make
          mv polyglot polyglot-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyglot-linux-x86_64
          path: polyglot-linux-x86_64

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install automake autoconf

      - name: Build
        run: |
          ./configure
          make
          mv polyglot polyglot-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyglot-macos-arm64
          path: polyglot-macos-arm64

  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/polyglot-linux-x86_64/polyglot-linux-x86_64
            artifacts/polyglot-macos-arm64/polyglot-macos-arm64
          generate_release_notes: true
